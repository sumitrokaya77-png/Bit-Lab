<!DOCTYPE html>

  <title>Pink Cycle - Chat Hub</title>
  <style>
    /* ==========================================================================
       1. THEME DESIGN SYSTEM & RESET (Matches Button-Details 1:1)
       ========================================================================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #FFFFFF;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1A1A1A;
    }

    .phone-container {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 840px;
      background-color: #FFF0FB;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.05);
    }

    /* ==========================================================================
       2. TOP FIXED NAVIGATION HEADER
       ========================================================================== */
    .dashboard-header {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      padding: 16px;
      background-color: #FFFFFF;
      border-bottom: 1px solid #FFE4F5;
      flex-shrink: 0;
      z-index: 10;
    }

    .btn-back-nav {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background-color: #FFF8FC;
      border: 1px solid #FFE4F5;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #FF1FA9;
      text-decoration: none;
      transition: background-color 0.2s ease;
      cursor: pointer;
    }

    .btn-back-nav:active {
      background-color: #FFE4F5;
    }

    .dashboard-title-heading {
      text-align: center;
      font-size: 18px;
      font-weight: 800;
      color: #1A1A1A;
      letter-spacing: -0.3px;
    }

    /* ==========================================================================
       3. SCROLLABLE SCREEN CANVAS
       ========================================================================== */
    .scroll-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      background-color: #FAFAFA;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* Navigation Card Configuration */
    .menu-navigation-card {
      display: flex;
      align-items: center;
      gap: 16px;
      background-color: #FFFFFF;
      border: 1.5px solid #FFF2FA;
      border-radius: 20px;
      padding: 20px 16px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 4px 12px rgba(255, 31, 169, 0.01);
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }

    /* Tactile Micro-Scaling Feedback Loop */
    .menu-navigation-card:active {
      transform: scale(0.98);
      background-color: #FFFDFE;
      border-color: #FF1FA9;
      box-shadow: 0 2px 6px rgba(255, 31, 169, 0.04);
    }

    /* Custom Icon Asset Container Base */
    .card-icon-frame {
      width: 60px;
      height: 60px;
      border-radius: 16px;
      background-color: #FFF0F8;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background-color 0.2s ease;
      color: #FF1FA9;
    }

    .menu-navigation-card:active .card-icon-frame {
      background-color: #FFE4F3;
    }

    /* Central Detailed Text Stack Columns */
    .card-text-stack {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
    }

    .card-main-title {
      font-size: 16px;
      font-weight: 800;
      color: #FF1FA9;
      letter-spacing: -0.2px;
    }

    .card-sub-description {
      font-size: 12px;
      line-height: 1.4;
      color: #666666;
      font-weight: 500;
    }

    /* Trailing Right-Hand Path Indicators */
    .card-chevron-indicator {
      color: #C5C5C7;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-left: 4px;
      transition: color 0.2s ease;
    }

    .menu-navigation-card:active .card-chevron-indicator {
      color: #FF1FA9;
    }

    /* Styling variant for locked/future features */
    .card-locked {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .card-locked:active {
      transform: none;
      border-color: #FFF2FA;
    }
  </style>
</head>
