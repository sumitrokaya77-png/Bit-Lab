<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pink Cycle - Select Doctor</title>
  <link rel="stylesheet" href="Select-doctor.css">
</head>
<body>

  <div class="phone-container">
    
    <header class="main-header">
      <button class="header-icon-btn" id="btn-header-back" aria-label="Go Back">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
      </button>
      <h1 class="header-main-title">Consultations</h1>
      <div class="header-space-block"></div>
    </header>

    <section class="controls-filter-tray">
      <div class="search-input-wrapper">
        <input type="text" id="search-input" placeholder="Search by specialist name...">
      </div>
      <div class="sort-dropdown-wrapper">
        <select id="filter-select">
          <option value="default">Sort: Recommended</option>
          <option value="price-low">Price: Low to High</option>
          <option value="price-high">Price: High to Low</option>
          <option value="rating-high">Top Rated ★</option>
        </select>
      </div>
    </section>

    <main class="scrollable-catalog-body">
      <div class="doctors-box-grid" id="doctors-list-wrapper">
        </div>
    </main>

    <footer class="sticky-footer-nav-bar">
      <button class="appointments-toggle-trigger-btn" id="btn-toggle-appointments">
        <span class="btn-inner-flex">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          Manage Bookings & History
        </span>
        <span class="active-badge-counter" id="active-appointments-badge">0</span>
      </button>
    </footer>

    <div class="appointments-drawer-backdrop" id="appointments-drawer">
      <div class="appointments-drawer-card">
        
        <div class="drawer-header-strip">
          <h2 class="drawer-headline">Your Consultations</h2>
          <button class="drawer-dismiss-btn" id="btn-close-drawer" aria-label="Dismiss Drawer">✕</button>
        </div>

        <div class="drawer-scrollable-content-area">
          
          <section class="drawer-chronological-group">
            <h3 class="group-category-title">Current Appointments</h3>
            <div class="line-items-stack" id="current-appointments-list">
              </div>
          </section>

          <section class="drawer-chronological-group">
            <h3 class="group-category-title">Past Appointments History</h3>
            <div class="line-items-stack" id="past-appointments-list">
              </div>
          </section>

        </div>

      </div>
    </div>

  </div>

  <script src="Select-doctor.js" defer></script>
</body>
</html>
