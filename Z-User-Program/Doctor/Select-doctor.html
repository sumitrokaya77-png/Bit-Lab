<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pink Cycle - Select Doctor</title>
  <link rel="stylesheet" href="Select-doctor.css">
</head>
<body>

  <div class="phone-container">
    <!-- Top Branding & Search Section -->
    <header class="app-header">
      <div class="brand-row">
        <!-- Back Button Link -->
        <a href="../Dashboard/Dashboard.html" class="btn-back" aria-label="Go back to dashboard">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </a>
        <!-- Centered Title -->
        <span class="brand-tagline">Consult Specialists</span>
      </div>
      <div class="search-bar-wrapper">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input type="text" id="search-input" placeholder="Search specialized medical doctors...">
      </div>
    </header>

    <!-- Main Dynamic Viewport: Problem 1 Box Cards Catalog -->
    <main class="scrollable-catalog-body">
      <div class="catalog-headline-row">
        <h2>Available Specialists</h2>
        <span id="catalog-count-label">0 listed</span>
      </div>
      
      <!-- Box list layout injected programmatically -->
      <div class="doctor-box-grid" id="doctor-catalog-grid"></div>
    </main>

    <!-- Sticky Navigation Shelf & Toggle Controls: Problem 2 Drawer Trigger -->
    <footer class="sticky-footer-nav">
      <button class="appointments-toggle-btn" id="btn-toggle-drawer">
        <div class="toggle-btn-content">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
          <span>My Appointments Tracker</span>
        </div>
        <span class="appointment-badge-counter" id="drawer-counter-badge">0</span>
      </button>
    </footer>

    <!-- Bottom Sliding Panel Overlay: Problem 2 Line List Drawer Layout -->
    <div class="drawer-backdrop-shading" id="drawer-overlay"></div>
    <div class="sliding-appointments-drawer" id="appointments-drawer">
      <div class="drawer-drag-header">
        <div class="drag-handle-bar"></div>
        <h3>My Scheduled Appointments</h3>
      </div>
      
      <div class="drawer-scrollable-content">
        
        <!-- Section A: Current Appointments Active Line Track -->
        <div class="drawer-section">
          <h4 class="section-title">Current Appointments</h4>
          <div class="line-list-container" id="current-appointments-line-list">
            <!-- Line-items injected programmatically -->
          </div>
        </div>

        <!-- Section B: Historic Appointments Track Log -->
        <div class="drawer-section">
          <h4 class="section-title">Past Appointments History</h4>
          <div class="line-list-container" id="historic-appointments-line-list">
            <!-- Line-items injected programmatically -->
          </div>
        </div>

      </div>
    </div>

  </div>

  <script src="Select-doctor.js" defer></script>
</body>
</html>
