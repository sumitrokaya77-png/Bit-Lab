<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: #FFFFFF; padding: 0 16px; font-family: -apple-system, sans-serif; overflow: hidden; }
    .card-personalized-placeholder {
      background-color: #FDF8FB; border: 2px dashed #EAEAEA; border-radius: 16px; padding: 16px; display: flex; align-items: center; gap: 14px; height: 110px;
    }
    .placeholder-icon-wrapper {
      width: 44px; height: 44px; background-color: #F1F1F1; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .placeholder-icon-wrapper svg { width: 22px; height: 22px; }
    .placeholder-info { display: flex; flex-direction: column; gap: 4px; }
    .status-badge { background-color: #ECECEC; color: #666666; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; width: fit-content; text-transform: uppercase; }
    .status-caption { color: #8E8E93; font-size: 12px; line-height: 1.3; }
  </style>
</head>
<body>
  <div class="card-personalized-placeholder">
    <div class="placeholder-icon-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#A3A3A3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
    </div>
    <div class="placeholder-info">
      <span class="status-badge">Not Available</span>
    </div>
  </div>
</body>
</html>
