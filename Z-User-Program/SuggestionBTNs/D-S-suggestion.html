<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Sanitation Suggestions Shell</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 100%; height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    .sticky-header {
      width: 100%; height: 76px; background-color: #FFFFFF;
      border-bottom: 1px solid #FDF2F9; display: flex;
      align-items: center; justify-content: space-between; padding: 0 16px; flex-shrink: 0;
    }
    .back-btn {
      background: none; border: none; color: #FF1FA9; cursor: pointer;
      width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
      border-radius: 50%; transition: background-color 0.2s;
    }
    .back-btn:active { background-color: #FFE4F5; }
    .back-btn svg { width: 24px; height: 24px; }
    .header-title { color: #FF1FA9; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .header-spacer { width: 40px; }
    
    /* Disclaimer Bar Styling */
    .disclaimer-banner {
      background-color: #FFF0F5; border-left: 4px solid #FF1FA9;
      padding: 10px 36px 10px 14px; position: relative; margin: 12px 16px 4px 16px;
      border-radius: 6px; flex-shrink: 0; display: flex; align-items: flex-start;
      transition: all 0.25s ease-in-out;
    }
    .disclaimer-text { color: #555555; font-size: 11.5px; line-height: 1.4; font-weight: 500; }
    .disclaimer-text strong { color: #FF1FA9; }
    .close-disclaimer-btn {
      position: absolute; top: 8px; right: 8px; background: none; border: none;
      color: #8E8E93; font-size: 16px; font-weight: 700; cursor: pointer; padding: 2px 6px;
    }
    .close-disclaimer-btn:hover { color: #FF1FA9; }

    /* Main Frame Area Content */
    .content-frame-container {
      flex: 1; display: flex; flex-direction: column; gap: 10px; padding: 8px 0; overflow: hidden;
    }
    .section-block { display: flex; flex-direction: column; gap: 6px; width: 100%; }
    .section-block.personalized { height: 165px; flex-shrink: 0; }
    .section-block.regular { flex: 1; }
    .section-label { color: #4A4A4A; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 0 16px; }
    .embedded-view-iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>

  <header class="sticky-header">
    <button class="back-btn" id="back-to-home-btn" aria-label="Go Back">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    </button>
    <h1 class="header-title">Sanitation Suggestions</h1>
    <div class="header-spacer"></div>
  </header>

  <div class="disclaimer-banner" id="medical-disclaimer">
    <p class="disclaimer-text">
      <strong>⚠️ Medical Disclaimer:</strong> General educational & self-care advice only. Not medical advice. If symptoms are severe or persistent, please consult a qualified healthcare professional.
    </p>
    <button class="close-disclaimer-btn" onclick="dismissDisclaimer()">×</button>
  </div>

  <main class="content-frame-container">
    <section class="section-block personalized">
      <h2 class="section-label">Personalized Suggestions</h2>
      <iframe src="P-S-suggestion.html" class="embedded-view-iframe" scrolling="no"></iframe>
    </section>
    <section class="section-block regular">
      <h2 class="section-label">Regular Suggestions</h2>
      <iframe src="R-S-suggestion.html" class="embedded-view-iframe"></iframe>
    </section>
  </main>

  <script>
    function dismissDisclaimer() {
      const banner = document.getElementById('medical-disclaimer');
      banner.style.opacity = '0';
      setTimeout(() => banner.remove(), 250);
    }
    document.getElementById("back-to-home-btn").addEventListener("click", () => {
      window.location.href = "../Dashboard/Dashboard.html";
    });
  </script>
</body>
</html>
