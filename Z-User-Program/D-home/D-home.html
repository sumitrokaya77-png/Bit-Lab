<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pink Cycle - Home Content</title>
  <link rel="stylesheet" href="D-home.css">
</head>
<body>

  <div class="dhome-main-container">
    
    <!-- 1. Calendar Frame with Clearance Space and Shape Background -->
    <section class="calendar-section">
      <iframe src="../Calender/log-calender.html" class="embedded-frame calendar-frame" scrolling="no" title="Log Calendar"></iframe>
    </section>
    
    <!-- 2. Slide Boxes Articles Component -->
    <section class="slides-section">
      <iframe src="../Box-artical/Slide-boxes.html" class="embedded-frame slides-frame" scrolling="no" title="Article Slides"></iframe>
    </section>

    <!-- 3. Suggestion & Health Action Rows -->
    <section class="suggestions-section">
      
      <!-- Food Suggestion Row -->
      <div class="action-card-row" id="btn-food-suggestion">
        <div class="icon-avatar">
          <img src="../user_ui_png/food-icon.png" alt="Food Icon" />
        </div>
        <span class="action-label">Food Suggestions</span>
      </div>

      <!-- Sanitation Suggestion Row -->
      <div class="action-card-row" id="btn-sanitation-suggestion">
        <div class="icon-avatar">
          <img src="../user_ui_png/sanitation-icon.png" alt="Sanitation Icon" />
        </div>
        <span class="action-label">Sanitation Suggestions</span>
      </div>

      <!-- Contact Doctor Row -->
      <div class="action-card-row" id="btn-doctor-contact">
        <div class="icon-avatar">
          <img src="../user_ui_png/doctor-icon.png" alt="Doctor Icon" />
        </div>
        <span class="action-label">Contact Doctor</span>
      </div>

    </section>

  </div>

  <script src="D-home.js"></script>
</body>
</html>
