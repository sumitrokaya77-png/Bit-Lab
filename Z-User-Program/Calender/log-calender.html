<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log Period — Pink Cycle</title>
  <style>
    /* ─────────────────────────────────────────
       EMBEDDABLE COMPONENT
       Drop this into any layout.
       All styles are scoped under .pc-widget
    ───────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #FFF0FB;
      display: flex;
      justify-content: center;
      padding: 16px;
    }

    .pc-widget {
      width: 100%;
      max-width: 360px;
    }

    /* ── MINI CALENDAR CARD ── */
    .mini-card {
      border: 2px solid #FF1FA9;
      border-radius: 18px;
      background: #fff;
      padding: 12px 14px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .mini-card:hover { background: #FFF0FB; }

    .mini-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .mini-month-lbl { font-size: 13px; font-weight: 700; color: #FF1FA9; }
    .mini-hint      { font-size: 11px; color: #FF62C3; }

    .mini-wdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      margin-bottom: 4px;
    }
    .mini-wdays span {
      text-align: center;
      font-size: 9px;
      font-weight: 700;
      color: #FF62C3;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }
    .mc {
      width: 100%; aspect-ratio: 1;
      border-radius: 50%;
      border: 1.5px solid #FF1FA9;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px; font-weight: 700;
      color: #FF1FA9;
    }
    .mc.pd  { background: #FF62C3; border-color: #FF1FA9; color: #fff; }
    .mc.td  { box-shadow: 0 0 0 2px #FF2BAE; }
    .mc.em  { border-color: transparent; background: transparent; color: transparent; }

    /* ── BUTTONS ── */
    .pc-btn {
      width: 100%;
      padding: 13px;
      border-radius: 50px;
      border: none;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: background 0.15s, transform 0.1s;
    }
    .pc-btn:active { transform: scale(0.98); }
    .btn-log  { background: #FF1FA9; color: #fff; }
    .btn-log:hover  { background: #C8007E; }
    .btn-log:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-edit { background: #fff; color: #FF1FA9; border: 2px solid #FF1FA9; }
    .btn-edit:hover { background: #FFF0FB; }

    /* ── LOGGED STATE: PERIOD ACTIVE ── */
    .logged-box {
      background: #fff;
      border: 2px solid #FF1FA9;
      border-radius: 18px;
      padding: 28px 16px;
      text-align: center;
    }
    .lg-period { font-size: 15px; font-weight: 700; color: #FF1FB0; margin-bottom: 4px; }
    .lg-day    { font-size: 24px; font-weight: 700; color: #FF0000; margin-bottom: 2px; }
    .lg-left   { font-size: 24px; font-weight: 700; color: #FF0000; margin-bottom: 6px; }
    .lg-range  { font-size: 15px; font-weight: 700; color: #FF1FB0; }

    /* ── LOGGED STATE: UPCOMING / NEXT ── */
    .up-days  { font-size: 40px; font-weight: 700; color: #FF0000; margin-bottom: 2px; }
    .up-label { font-size: 15px; font-weight: 700; color: #FF1FB0; margin-bottom: 6px; }
    .up-range { font-size: 13px; color: #FF62C3; }
  </style>
</head>
<body>
  <div class="pc-widget" id="pcWidget">

    <!-- STATE A: show mini cal + log button -->
    <div id="stateReady">
      <div class="mini-card" id="miniCal"
           role="button" tabindex="0"
           aria-label="Open date picker">
        <div class="mini-top">
          <span class="mini-month-lbl" id="miniLbl">—</span>
          <span class="mini-hint">tap to select ›</span>
        </div>
        <div class="mini-wdays">
          <span>S</span><span>M</span><span>T</span><span>W</span>
          <span>T</span><span>F</span><span>S</span>
        </div>
        <div class="mini-grid" id="miniGrid"></div>
      </div>
      <button class="pc-btn btn-log" id="btnLog" disabled>
        Log period
      </button>
    </div>

    <!-- STATE B: period logged display -->
    <div id="stateLogged" style="display:none;">
      <div class="logged-box" id="loggedBox"></div>
      <button class="pc-btn btn-edit" id="btnEdit">
        ✎ Edit period
      </button>
    </div>

  </div>

  <script>
  (function () {
    /* ─── CONSTANTS ─── */
    var STORAGE_KEY  = 'pc_period';
    var PICKER_URL   = 'date-picker.html';
    var CHANNEL_NAME = 'pc_channel';
    var CYCLE        = 28;
    var SHORT = ["Jan","Feb","Mar","Apr","May","Jun",
                 "Jul","Aug","Sep","Oct","Nov","Dec"];

    /* ─── STATE ─── */
    var data    = null;   // { pStart:{y,m,d}, pEnd:{y,m,d}, logged:bool }
    var today   = new Date(); today.setHours(0,0,0,0);

    /* ─── HELPERS ─── */
    function ts(y, m, d)   { return new Date(y, m, d).getTime(); }
    function addD(date, n) { var d = new Date(date); d.setDate(d.getDate() + n); return d; }
    function fmtShort(d)   { return SHORT[d.getMonth()] + ' ' + d.getDate(); }
    function ordinal(n) {
      var s = ['th','st','nd','rd'], v = n % 100;
      return n + (s[(v - 20) % 10] || s[v] || s[0]);
    }
    function daysInMonth(y, m)  { return new Date(y, m + 1, 0).getDate(); }
    function firstWeekday(y, m) { return new Date(y, m, 1).getDay(); }

    function isInRange(y, m, d) {
      if (!data) return false;
      var t = ts(y, m, d);
      return t >= ts(data.pStart.y, data.pStart.m, data.pStart.d) &&
             t <= ts(data.pEnd.y,   data.pEnd.m,   data.pEnd.d);
    }

    /* ─── LOAD FROM LOCALSTORAGE ─── */
    function loadData() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        data = raw ? JSON.parse(raw) : null;
      } catch (e) { data = null; }
    }

    /* ─── RENDER MINI CALENDAR ─── */
    function renderMiniCal() {
      var grid = document.getElementById('miniGrid');
      var lbl  = document.getElementById('miniLbl');
      grid.innerHTML = '';

      if (!data) {
        lbl.textContent = SHORT[today.getMonth()] + ' ' + today.getFullYear();
        /* render empty current month */
        renderEmptyMonth(today.getFullYear(), today.getMonth());
        return;
      }

      var refYear  = data.pStart.y;
      var refMonth = data.pStart.m;
      lbl.textContent = SHORT[refMonth] + ' ' + refYear;

      var fd    = firstWeekday(refYear, refMonth);
      var dim   = daysInMonth(refYear, refMonth);
      var total = Math.ceil((fd + dim) / 7) * 7;
      var tKey  = ts(today.getFullYear(), today.getMonth(), today.getDate());

      for (var i = 0; i < total; i++) {
        var c = document.createElement('div');
        if (i < fd || i >= fd + dim) {
          c.className = 'mc em';
        } else {
          var day = i - fd + 1;
          var y = refYear, m = refMonth, dv = day;
          var cls = 'mc' +
            (isInRange(y, m, dv) ? ' pd' : '') +
            (ts(y, m, dv) === tKey ? ' td' : '');
          c.className = cls;
          c.textContent = day;
        }
        grid.appendChild(c);
      }
    }

    function renderEmptyMonth(year, month) {
      var grid  = document.getElementById('miniGrid');
      var fd    = firstWeekday(year, month);
      var dim   = daysInMonth(year, month);
      var total = Math.ceil((fd + dim) / 7) * 7;
      var tKey  = ts(today.getFullYear(), today.getMonth(), today.getDate());

      for (var i = 0; i < total; i++) {
        var c = document.createElement('div');
        if (i < fd || i >= fd + dim) {
          c.className = 'mc em';
        } else {
          var day = i - fd + 1;
          c.className = 'mc' + (ts(year, month, day) === tKey ? ' td' : '');
          c.textContent = day;
        }
        grid.appendChild(c);
      }
    }

    /* ─── RENDER LOGGED STATE ─── */
    function renderLoggedBox() {
      var s    = new Date(data.pStart.y, data.pStart.m, data.pStart.d);
      var e    = new Date(data.pEnd.y,   data.pEnd.m,   data.pEnd.d);
      var box  = document.getElementById('loggedBox');
      var todayTs = today.getTime();

      if (todayTs >= s.getTime() && todayTs <= e.getTime()) {
        /* Period active now */
        var dayNum  = Math.round((todayTs - s.getTime()) / 86400000) + 1;
        var dLeft   = Math.round((e.getTime() - todayTs) / 86400000);
        var leftTxt = dLeft === 0 ? 'Last day' : dLeft + ' day' + (dLeft === 1 ? '' : 's') + ' left';
        box.innerHTML =
          '<p class="lg-period">Period</p>' +
          '<p class="lg-day">'   + ordinal(dayNum) + ' day</p>' +
          '<p class="lg-left">'  + leftTxt + '</p>' +
          '<p class="lg-range">' + fmtShort(s) + ' to ' + fmtShort(e) + '</p>';

      } else if (todayTs < s.getTime()) {
        /* Period upcoming */
        var daysUntil = Math.round((s.getTime() - todayTs) / 86400000);
        box.innerHTML =
          '<p class="up-days">'  + daysUntil + '</p>' +
          '<p class="up-label">days until your period</p>' +
          '<p class="up-range">' + fmtShort(s) + ' to ' + fmtShort(e) + '</p>';

      } else {
        /* Period ended — predict next */
        var nextS  = addD(s, CYCLE);
        var nextE  = addD(e, CYCLE);
        var d2     = Math.max(0, Math.round((nextS.getTime() - todayTs) / 86400000));
        box.innerHTML =
          '<p class="up-days">'  + d2 + '</p>' +
          '<p class="up-label">days until your next period</p>' +
          '<p class="up-range">Predicted ' + fmtShort(nextS) + ' to ' + fmtShort(nextE) + '</p>';
      }
    }

    /* ─── SHOW STATE ─── */
    function render() {
      loadData();
      var btnLog      = document.getElementById('btnLog');
      var stateReady  = document.getElementById('stateReady');
      var stateLogged = document.getElementById('stateLogged');

      if (data && data.logged) {
        /* Show logged view */
        stateReady.style.display  = 'none';
        stateLogged.style.display = 'block';
        renderLoggedBox();
      } else {
        /* Show mini cal view */
        stateReady.style.display  = 'block';
        stateLogged.style.display = 'none';
        renderMiniCal();
        var hasDates = !!(data && data.pStart);
        btnLog.disabled   = !hasDates;
        btnLog.style.opacity = hasDates ? '1' : '0.4';
        btnLog.style.cursor  = hasDates ? 'pointer' : 'not-allowed';
      }
    }

    /* ─── OPEN PICKER ─── */
    function openPicker() {
      window.top.location.href ="../calender/date-picker.html";
    }

    /* ─── EVENTS ─── */
    document.getElementById('miniCal').addEventListener('click', openPicker);
    document.getElementById('miniCal').addEventListener('keydown', function (e) {
      if (e.key === 'Enter' || e.key === ' ') openPicker();
    });

    document.getElementById('btnLog').addEventListener('click', function () {
      if (!data || !data.pStart) return;
      data.logged = true;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      render();
    });

    document.getElementById('btnEdit').addEventListener('click', openPicker);

    /* ─── SYNC: re-render when returning from picker ─── */
    /* visibilitychange fires when user navigates back */
    document.addEventListener('visibilitychange', function () {
      if (document.visibilityState === 'visible') render();
    });

    /* localStorage event fires when another tab/page updates storage */
    window.addEventListener('storage', function (e) {
      if (e.key === STORAGE_KEY) render();
    });

    /* BroadcastChannel for same-origin instant sync */
    if (typeof BroadcastChannel !== 'undefined') {
      var bc = new BroadcastChannel(CHANNEL_NAME);
      bc.addEventListener('message', function (e) {
        if (e.data && e.data.type === 'period_updated') render();
      });
    }

    /* ─── INIT ─── */
    render();

  })();
  </script>
</body>
</html>
