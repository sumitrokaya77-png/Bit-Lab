<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0,
        maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#FFF0FB">
  <title>Select Period Date — Pink Cycle</title>
  <link rel="stylesheet" href="date-picker.css">
</head>
<body>

  <!-- ══ TOP BAR ══ -->
  <div class="topbar">
    <span class="topbar-title">Select period dates</span>
    <button class="btn-cancel"
            id="btnCancel"
            aria-label="Cancel and go back">
      ✕ Cancel
    </button>
  </div>

  <!-- ══ SCROLLABLE CONTENT ══ -->
  <div class="content">

    <!-- YEAR WHEEL -->
    <div class="yr-section">
      <div class="yr-section-lbl">Year</div>
      <div class="yr-wheel-wrap" aria-label="Select year">
        <div class="yr-sel-bar" aria-hidden="true"></div>
        <div class="yr-wheel"
             id="yrWheel"
             role="listbox"
             aria-label="Year selector"></div>
      </div>
    </div>

    <!-- CALENDAR BOX -->
    <div class="cal-box" role="application" aria-label="Select period dates">

      <div class="month-nav-row">
        <button class="mn-arrow" id="mnPrev" aria-label="Previous month">&#8249;</button>
        <span   class="mn-label" id="mnLabel" aria-live="polite">—</span>
        <button class="mn-arrow" id="mnNext" aria-label="Next month">&#8250;</button>
      </div>

      <div class="p-wdays" aria-hidden="true">
        <span>Su</span><span>Mo</span><span>Tu</span><span>We</span>
        <span>Th</span><span>Fr</span><span>Sa</span>
      </div>

      <div class="p-daygrid" id="pdGrid"></div>

      <div class="range-info"
           id="rangeInfo"
           aria-live="polite">
        Tap a date to begin
      </div>

    </div><!-- /cal-box -->

    <!-- VALIDATION ERROR -->
    <div class="val-error"
         id="valError"
         role="alert"
         aria-live="assertive">
    </div>

    <!-- TODAY / RESET -->
    <div class="quick-btns">
      <button class="quick-btn" id="btnToday" aria-label="Reset to today's date">Today</button>
      <button class="quick-btn" id="btnReset" aria-label="Clear all selected dates">Reset</button>
    </div>

    <!-- CONFIRM -->
    <button class="btn-confirm"
            id="btnConfirm"
            disabled
            aria-label="Confirm selected period dates">
      Confirm
    </button>

  </div><!-- /content -->

  <script src="date-picker.js"></script>
</body>
</html>
