<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pink Cycle - Notifications</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #F8F9FA;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1A1A1A;
    }
    .phone-container {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 840px;
      background-color: #FFFFFF;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.05);
    }
    .settings-header {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      padding: 16px;
      background-color: #FFFFFF;
      border-bottom: 1px solid #FFE4F5;
      flex-shrink: 0;
    }
    .btn-back-nav {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background-color: #FFF8FC;
      border: 1px solid #FFE4F5;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #FF1FA9;
      text-decoration: none;
    }
    .settings-title { text-align: center; font-size: 18px; font-weight: 800; color: #1A1A1A; }
    .scroll-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      background-color: #FAFAFA;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .settings-card {
      background-color: #FFFFFF;
      border: 1.5px solid #FFF2FA;
      border-radius: 16px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .control-label {
      font-size: 12px;
      font-weight: 800;
      color: #C0127E;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .select-input, .time-input {
      width: 100%;
      padding: 12px;
      border: 1.5px solid #FFE4F5;
      border-radius: 10px;
      background-color: #FFF8FC;
      font-size: 14px;
      font-weight: 600;
      color: #2C2C2C;
      outline: none;
    }
    .select-input:focus, .time-input:focus {
      border-color: #FF1FA9;
      background-color: #FFFFFF;
    }
    
    .preview-section-title {
      font-size: 13px;
      font-weight: 800;
      color: #7A7A7A;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-left: 4px;
    }
    .notification-list-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .notif-item {
      background-color: #FFFFFF;
      border-left: 4px solid #E2E2E9;
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.02);
      transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .notif-item.prio-1 { border-left-color: #D80085; background-color: #FFF5FA; }
    .notif-item.prio-2 { border-left-color: #FF1FA9; }
    .notif-item.prio-3 { border-left-color: #A2A2B5; }
    
    .notif-main { display: flex; flex-direction: column; gap: 2px; }
    .notif-title { font-size: 14px; font-weight: 700; color: #2C2C2C; }
    .notif-desc { font-size: 12px; color: #666666; }
    .badge-priority {
      font-size: 10px;
      font-weight: 800;
      padding: 4px 8px;
      border-radius: 20px;
      text-transform: uppercase;
    }
    .badge-priority.b-1 { background-color: #FFE4F3; color: #D80085; }
    .badge-priority.b-2 { background-color: #FFF0F9; color: #FF1FA9; }
    .badge-priority.b-3 { background-color: #F1F1F5; color: #666666; }
  </style>
</head>
<body>

  <div class="phone-container">
    <header class="settings-header">
      <a href="M-3line.html" class="btn-back-nav">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width:20px; height:20px;"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" /></svg>
      </a>
      <h1 class="settings-title">Notifications</h1>
      <div></div>
    </header>

    <main class="scroll-body">
      <div class="settings-card">
        <!-- Option 1: Live Sorting Mechanism Controller -->
        <div class="control-group">
          <label class="control-label" for="sel-sort-order">Sort Priority Rules</label>
          <select class="select-input" id="sel-sort-order">
            <option value="chronological">Chronological Order (Standard)</option>
            <option value="priority-high">High Importance First (Doctor > Cycle > Other)</option>
          </select>
        </div>

        <!-- Option 2: Time Settings Selector -->
        <div class="control-group">
          <label class="control-label" for="time-daily-alert">Daily Alert Delivery Time</label>
          <input type="time" class="time-input" id="time-daily-alert">
        </div>
      </div>

      <!-- Live Dynamic View Sorting Feed Preview -->
      <h3 class="preview-section-title">Live Feed Order Preview</h3>
      <div class="notification-list-container" id="box-feed-render-lane">
        <!-- Render targets populated array blocks -->
      </div>
    </main>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const selectSort = document.getElementById("sel-sort-order");
      const timeAlertInput = document.getElementById("time-daily-alert");
      const feedContainer = document.getElementById("box-feed-render-lane");

      // Set standard fallback data logs
      const notificationsDataArray = [
        { id: 1, typeId: 2, title: "Period Reminder", text: "Expected start threshold approaching in 48 hours.", rank: 2, timeWeight: 2 },
        { id: 2, typeId: 1, title: "Dr. Anjali (OB/GYN Appointment)", text: "Routine follow-up consultation set for tomorrow morning.", rank: 1, timeWeight: 1 },
        { id: 3, typeId: 3, title: "Article Update", text: "New hydration tips are now available in your feed.", rank: 3, timeWeight: 3 }
      ];

      // Load cached selections
      selectSort.value = localStorage.getItem("pinkCycle_notifSortMethod") || "chronological";
      timeAlertInput.value = localStorage.getItem("pinkCycle_notifTimeTarget") || "08:30";

      function displayProcessedFeedLayout() {
        const structuralSortingRule = selectSort.value;
        
        // Deep copy array parameters for clean functional sorting mutations
        let workingArray = [...notificationsDataArray];

        if (structuralSortingRule === "priority-high") {
          workingArray.sort((firstNode, secondNode) => firstNode.rank - secondNode.rank);
        } else {
          workingArray.sort((firstNode, secondNode) => firstNode.timeWeight - secondNode.timeWeight);
        }

        feedContainer.innerHTML = "";

        workingArray.forEach(item => {
          const itemDivNode = document.createElement("div");
          itemDivNode.className = `notif-item prio-${item.rank}`;
          
          let priorityTextLabel = item.rank === 1 ? "Priority 1" : item.rank === 2 ? "Priority 2" : "Other";
          
          itemDivNode.innerHTML = `
            <div class="notif-main">
              <span class="notif-title">${item.title}</span>
              <span class="notif-desc">${item.text}</span>
            </div>
            <span class="badge-priority b-${item.rank}">${priorityTextLabel}</span>
          `;
          feedContainer.appendChild(itemDivNode);
        });
      }

      // Hook control value modifications
      selectSort.addEventListener("change", (e) => {
        localStorage.setItem("pinkCycle_notifSortMethod", e.target.value);
        displayProcessedFeedLayout();
      });

      timeAlertInput.addEventListener("change", (e) => {
        localStorage.setItem("pinkCycle_notifTimeTarget", e.target.value);
      });

      // Run initial load layout render
      displayProcessedFeedLayout();
    });
  </script>
</body>
</html>
