<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pink Cycle - Menu</title>
  <style>
    /* ==========================================================================
       1. THEME DESIGN SYSTEM & RESET
       ========================================================================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #FFFFFF;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1A1A1A;
    }

    .phone-container {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 840px;
      background-color: #FFF0FB;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.05);
    }

    /* ==========================================================================
       2. TOP NAVIGATION GRID (HEADER)
       ========================================================================== */
    .menu-header {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      padding: 16px;
      background-color: #FFFFFF;
      border-bottom: 1px solid #FFE4F5;
      flex-shrink: 0;
    }

    .btn-back-nav {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background-color: #FFF8FC;
      border: 1px solid #FFE4F5;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #FF1FA9;
      text-decoration: none;
      transition: background-color 0.2s ease;
    }

    .btn-back-nav:active {
      background-color: #FFE4F5;
    }

    .menu-title-heading {
      text-align: center;
      font-size: 18px;
      font-weight: 800;
      color: #1A1A1A;
      letter-spacing: -0.3px;
    }

    /* ==========================================================================
       3. SCROLLABLE LINK ACTIONS WRAPPER
       ========================================================================== */
    .menu-scroll-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      background-color: #FAFAFA;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .menu-group-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .menu-section-label {
      font-size: 11px;
      font-weight: 800;
      color: #C0127E;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-left: 4px;
      margin-bottom: 4px;
    }

    /* Modern Line-Row Links Architectural Blocks */
    .menu-action-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background-color: #FFFFFF;
      border: 1.5px solid #FFF2FA;
      border-radius: 14px;
      text-decoration: none;
      color: #2C2C2C;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .menu-action-row:active {
      background-color: #FFF8FC;
      border-color: #FFE4F5;
      transform: translateX(2px);
    }

    .row-left-alignment-stack {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .icon-wrapper-box {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background-color: #FFF8FC;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #FF1FA9;
      flex-shrink: 0;
    }

    .icon-wrapper-box svg {
      width: 20px;
      height: 20px;
    }

    .action-row-title {
      font-size: 14px;
      font-weight: 700;
    }

    .chevron-indicator {
      color: #C1C1C7;
      width: 16px;
      height: 16px;
    }

    /* Warning Exit Button Contrast Overrides */
    .variant-exit-row {
      border-color: #FFEBEE;
      color: #D32F2F;
    }

    .variant-exit-row:active {
      background-color: #FFEBEE;
      border-color: #FFCDD2;
    }

    .variant-exit-row .icon-wrapper-box {
      background-color: #FFEBEE;
      color: #D32F2F;
    }

    /* ==========================================================================
       4. APP FOOTER STAMP
       ========================================================================== */
    .menu-branding-footer {
      text-align: center;
      padding: 12px 16px 24px 16px;
      margin-top: auto;
    }

    .footer-app-version {
      font-size: 12px;
      font-weight: 700;
      color: #FF1FA9;
    }

    .footer-app-meta {
      font-size: 11px;
      color: #A1A1A8;
      margin-top: 2px;
    }
  </style>
</head>
<body>

                <path stroke-linecap="round" stroke-linejoin="round" d="M8.684 10.742h.008v.008h-.008v-.008zm3.75 0h.008v.008h-.008v-.008zm3.75 0h.008v.008h-.008v-.008z" />

  <!-- ==========================================================================
       5. RUNTIME EXITS CONTROLLER
       ========================================================================== */ -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const exitButtonRow = document.getElementById("btn-exit-application-row");

      exitButtonRow.addEventListener("click", () => {
        const confirmExecution = confirm("Are you sure you want to exit Pink Cycle?");
        if (!confirmExecution) return;

        // 1. Cordova / PhoneGap
        if (typeof navigator !== 'undefined' && navigator.app && navigator.app.exitApp) {
          navigator.app.exitApp();
          return;
        }

        // 2. Capacitor JS
        if (typeof window !== 'undefined' && window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App) {
          window.Capacitor.Plugins.App.exitApp();
          return;
        }

        // 3. Custom native WebView JavascriptInterface
        if (window.AndroidDeviceCloseInterface && window.AndroidDeviceCloseInterface.closeApp) {
          window.AndroidDeviceCloseInterface.closeApp();
          return;
        }

        // 4. Development Fallback 
        alert("System Notice: Native termination signal sent. Routing to empty workspace.");
        window.location.href = "about:blank";
      });
    });
  </script>
