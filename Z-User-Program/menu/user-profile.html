<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pink Cycle - User Profile</title>
  <style>
    /* ==========================================================================
       1. THEME DESIGN SYSTEM & RESET
       ========================================================================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #F8F9FA;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1A1A1A;
    }

    .phone-container {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 840px;
      background-color: #FFFFFF;
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 30px rgba(0,0,0,0.05);
    }

    /* ==========================================================================
       2. TOP FIXED NAVIGATION HEADER
       ========================================================================== */
    .profile-header {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      padding: 16px;
      background-color: #FFFFFF;
      border-bottom: 1px solid #FFE4F5;
      flex-shrink: 0;
      z-index: 10;
    }

    .btn-back-nav, .btn-cancel-edit {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background-color: #FFF8FC;
      border: 1px solid #FFE4F5;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #FF1FA9;
      text-decoration: none;
      transition: background-color 0.2s ease;
      cursor: pointer;
    }

    .btn-back-nav:active, .btn-cancel-edit:active {
      background-color: #FFE4F5;
    }

    .profile-title-heading {
      text-align: center;
      font-size: 18px;
      font-weight: 800;
      color: #1A1A1A;
      letter-spacing: -0.3px;
    }

    /* ==========================================================================
       3. SCROLLABLE SCREEN CONTAINER
       ========================================================================== */
    .profile-scroll-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px 80px 16px; 
      background-color: #FAFAFA;
      display: flex;
      flex-direction: column;
    }

    /* Avatar Workspace Frame Components */
    .avatar-view-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 24px;
      text-align: center;
    }

    .avatar-circle-wrapper {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background-color: #FFF8FC;
      border: 3px solid #FF1FA9;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(255, 31, 169, 0.15);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .avatar-circle-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .user-display-name {
      font-size: 20px;
      font-weight: 800;
      color: #1A1A1A;
      letter-spacing: -0.4px;
    }

    /* User Account ID Component Badge Styling */
    .user-id-container {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      background-color: #FFF2FA;
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px dashed #FFA6DD;
    }

    .user-id-label {
      font-size: 11px;
      font-weight: 800;
      color: #C0127E;
      letter-spacing: 0.2px;
    }

    .user-id-value {
      font-size: 12px;
      font-weight: 600;
      color: #555555;
      font-family: monospace, sans-serif;
    }

    .btn-copy-id {
      background: none;
      border: none;
      color: #FF1FA9;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2px;
      border-radius: 4px;
      transition: all 0.2s ease;
    }

    .btn-copy-id:active {
      transform: scale(0.85);
      color: #C0127E;
    }

    /* Dynamic Horizontal Selection Carousel for Edit State */
    .avatar-selector-grid-wrapper {
      display: none; 
      width: 100%;
      margin-bottom: 24px;
    }

    .avatar-grid-label {
      font-size: 11px;
      font-weight: 800;
      color: #C0127E;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
      text-align: center;
    }

    .avatar-horizontal-track {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding: 8px 4px;
      scroll-behavior: smooth;
    }

    .avatar-horizontal-track::-webkit-scrollbar {
      display: none; 
    }

    .selectable-avatar-option {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid #E2E2E9;
      background-color: #FFFFFF;
      overflow: hidden;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }

    .selectable-avatar-option.selected-active {
      border-color: #FF1FA9;
      box-shadow: 0 0 8px rgba(255, 31, 169, 0.4);
      transform: scale(1.08);
    }

    .selectable-avatar-option img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Bio Data Grid & Forms Elements Layout Blocks */
    .profile-group-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .profile-data-row {
      background-color: #FFFFFF;
      border: 1.5px solid #FFF2FA;
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .data-row-label {
      font-size: 11px;
      font-weight: 800;
      color: #C0127E;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    .data-row-value {
      font-size: 14px;
      font-weight: 700;
      color: #2C2C2C;
    }

    /* Native Form Fields Control Wrappers (Edit State View) */
    .input-field-element {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #FFE4F5;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      color: #2C2C2C;
      background-color: #FFF8FC;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s ease;
      margin-top: 4px;
    }

    .input-field-element:focus {
      border-color: #FF1FA9;
      background-color: #FFFFFF;
    }

    /* Ad Waiver Countdown Notification Frame */
    .ad-countdown-info-box {
      background-color: #FFF9FC;
      border: 1px dashed #FFC2E5;
      border-radius: 14px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 20px;
    }

    .ad-countdown-icon-box {
      color: #FF1FA9;
      flex-shrink: 0;
    }

    .ad-countdown-text {
      font-size: 13px;
      line-height: 1.4;
      font-weight: 600;
      color: #4A4A4A;
    }

    /* Add Extension Parameters Component Switcher */
    .btn-add-more-info {
      width: 100%;
      padding: 14px;
      background-color: transparent;
      border: 1.5px dashed #FFE4F5;
      border-radius: 14px;
      color: #C0127E;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      margin-top: 16px;
      transition: all 0.2s ease;
    }

    .btn-add-more-info:active {
      background-color: #FFF8FC;
      border-color: #FF1FA9;
    }

    /* ==========================================================================
       4. STICKY BOTTOM ACTION FOOTER
       ========================================================================== */
    .profile-fixed-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 14px 16px;
      background: linear-gradient(180deg, rgba(255,255,255,0) 0%, #FFFFFF 30%);
      flex-shrink: 0;
      z-index: 10;
    }

    .btn-sticky-profile-action {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 16px;
      background: linear-gradient(135deg, #FF1FA9 0%, #D80085 100%);
      color: #FFFFFF;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 4px 16px rgba(255, 31, 169, 0.25);
      transition: all 0.2s ease;
    }

    .btn-sticky-profile-action:active {
      transform: scale(0.98);
      box-shadow: 0 2px 8px rgba(255, 31, 169, 0.2);
    }

    /* Visibility Mode States Engine Classes */
    .state-view-only { display: block; }
    .state-edit-only { display: none; }

    body.edit-mode-active .state-view-only { display: none; }
    body.edit-mode-active .state-edit-only { display: block; }
    body.edit-mode-active .avatar-selector-grid-wrapper { display: block; }
  </style>
</head>
<body>

  <div class="phone-container">
    
    <!-- Top Fixed Navigation Header Grid -->
    <header class="profile-header">
      <!-- Read Mode Back Anchor -->
      <a href="M-3line.html" class="btn-back-nav state-view-only" aria-label="Back to Menu">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width:20px; height:20px;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
        </svg>
      </a>
      <!-- Edit Mode Rollback Interrupter Trigger -->
      <div class="btn-cancel-edit state-edit-only" id="btn-abort-edit-mode" aria-label="Cancel Changes">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" style="width:20px; height:20px;">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </div>
      
      <h1 class="profile-title-heading" id="lbl-header-title">My Profile</h1>
      <div></div>
    </header>

    <!-- Scrollable Workspace Screen Layout Frame -->
    <main class="profile-scroll-body">
      
      <!-- Top Center Core Identity View Node -->
      <section class="avatar-view-stack">
        <div class="avatar-circle-wrapper">
          <img id="img-active-avatar-node" src="../user_ui_png/pp-icon4.png" alt="User Profile Avatar">
        </div>
        <h2 class="user-display-name state-view-only" id="lbl-profile-name-title">User Name</h2>
        
        <!-- User ID Badge Layout with Clipboard Action Copy Trigger -->
        <div class="user-id-container state-view-only">
          <span class="user-id-label">ID:</span>
          <span class="user-id-value" id="lbl-user-id-value">xxxxxxxxxxxxxxx</span>
          <button type="button" class="btn-copy-id" id="btn-copy-user-id" aria-label="Copy User ID">
            <svg style="width:14px; height:14px;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 7.5V6.108c0-1.135.845-2.098 1.976-2.192.373-.03.748-.057 1.123-.08M15.75 18H18a2.25 2.25 0 002.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 00-1.123-.08M15.75 18.75v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5A3.375 3.375 0 006.375 7.5H5.25m11.9-3.664A2.251 2.251 0 0015 2.25h-1.5a2.251 2.251 0 00-2.15 1.586m5.8 0c.065.21.1.433.1.664v.75h-6V4.5c0-.231.035-.454.1-.664M6.75 7.5H4.875c-.621 0-1.125.504-1.125 1.125v12c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V16.5a9 9 0 00-9-9z" />
            </svg>
          </button>
        </div>
      </section>

      <!-- Horizontal Avatar Icon Selection Carousel Strip (Edit State Only) -->
      <section class="avatar-selector-grid-wrapper">
        <div class="avatar-grid-label">Choose Profile Avatar</div>
        <div class="avatar-horizontal-track" id="container-avatar-options-track">
          <!-- Populated Dynamically via Application Run Logic -->
        </div>
      </section>

      <!-- Core Onboarding Registration Properties Stack -->
      <section class="profile-group-section">
        
        <!-- Field 1: User Profile Name -->
        <div class="profile-data-row">
          <label class="data-row-label">Full Name</label>
          <span class="data-row-value state-view-only" id="val-view-name">--</span>
          <input type="text" class="input-field-element state-edit-only" id="input-edit-name" placeholder="Enter full name">
        </div>

        <!-- Field 2: Chronological Birth Date (DOB) -->
        <div class="profile-data-row">
          <label class="data-row-label">Date of Birth</label>
          <span class="data-row-value state-view-only" id="val-view-dob">--</span>
          <input type="date" class="input-field-element state-edit-only" id="input-edit-dob">
        </div>

        <!-- Field 3: Average Biological Cycle Length -->
        <div class="profile-data-row">
          <label class="data-row-label">Cycle Duration</label>
          <span class="data-row-value state-view-only" id="val-view-cycle-len">-- Days</span>
          <input type="number" class="input-field-element state-edit-only" id="input-edit-cycle-len" min="20" max="45" placeholder="e.g. 28">
        </div>

        <!-- Field 4: Length of Active Period Bleeding -->
        <div class="profile-data-row">
          <label class="data-row-label">Period Length</label>
          <span class="data-row-value state-view-only" id="val-view-period-len">-- Days</span>
          <input type="number" class="input-field-element state-edit-only" id="input-edit-period-len" min="2" max="10" placeholder="e.g. 5">
        </div>

        <!-- Field 5: Last Recorded Menstrual Start Date -->
        <div class="profile-data-row">
          <label class="data-row-label">Last Period Date</label>
          <span class="data-row-value state-view-only" id="val-view-last-date">--</span>
          <input type="date" class="input-field-element state-edit-only" id="input-edit-last-date">
        </div>

      </section>

      <!-- Read-Only Auxiliary Info Section: Ad Waiver Monitor Countdown Frame -->
      <section class="ad-countdown-info-box state-view-only" id="card-ad-countdown-view">
        <div class="ad-countdown-icon-box">
          <svg style="width:20px; height:20px;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <p class="ad-countdown-text" id="lbl-ad-reset-countdown-text">
          Loading active monetization tracking cycle properties...
        </p>
      </section>

      <!-- Expandable Secondary Component Button Wrapper -->
      <button class="btn-add-more-info state-view-only" id="btn-trigger-additional-logs" type="button">
        + Add More Information
      </button>

    </main>

    <!-- Sticky Bottom Screen Execution Layout Footer -->
    <footer class="profile-fixed-footer">
      <button class="btn-sticky-profile-action" id="btn-master-profile-action" type="button">
        <!-- Render Icon Content Object Dynamically -->
        <span id="holder-action-icon-svg">
          <svg style="width:18px; height:18px;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
          </svg>
        </span>
        <span id="lbl-master-action-text">Edit Profile</span>
      </button>
    </footer>

  </div>

  <!-- ==========================================================================
       5. DATA SYNC & STATE SWITCHER MOTOR SCRIPT
       ========================================================================== */ -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      
      // 1. Runtime Application State Cache Map Variables
      let isEditModeActive = false;
      let selectedAvatarPathStr = "";
      let user_id = null; // System Account State Token Variable

      // 2. Fetch Core Structural Element Node Targets
      const bodyNode = document.body;
      const lblHeaderTitle = document.getElementById("lbl-header-title");
      const imgActiveAvatarNode = document.getElementById("img-active-avatar-node");
      const lblProfileNameTitle = document.getElementById("lbl-profile-name-title");
      const containerAvatarOptionsTrack = document.getElementById("container-avatar-options-track");
      const lblUserIdValue = document.getElementById("lbl-user-id-value");
      
      // Action Node Targets
      const btnMasterProfileAction = document.getElementById("btn-master-profile-action");
      const btnAbortEditMode = document.getElementById("btn-abort-edit-mode");
      const btnCopyUserId = document.getElementById("btn-copy-user-id");
      const btnTriggerAdditionalLogs = document.getElementById("btn-trigger-additional-logs");
      const holderActionIconSvg = document.getElementById("holder-action-icon-svg");
      const lblMasterActionText = document.getElementById("lbl-master-action-text");
      const lblAdResetCountdownText = document.getElementById("lbl-ad-reset-countdown-text");

      // Interactive Content Nodes - Viewing Mapping Elements
      const valViewName = document.getElementById("val-view-name");
      const valViewDob = document.getElementById("val-view-dob");
      const valViewCycleLen = document.getElementById("val-view-cycle-len");
      const valViewPeriodLen = document.getElementById("val-view-period-len");
      const valViewLastDate = document.getElementById("val-view-last-date");

      // Interactive Content Nodes - Editing Input Elements
      const inputEditName = document.getElementById("input-edit-name");
      const inputEditDob = document.getElementById("input-edit-dob");
      const inputEditCycleLen = document.getElementById("input-edit-cycle-len");
      const inputEditPeriodLen = document.getElementById("input-edit-period-len");
      const inputEditLastDate = document.getElementById("input-edit-last-date");

      /**
       * Initialization Routine: Runs the profile image selector logic
       */
      function runAvatarSystemSelectorFallback() {
        const cachedAvatar = localStorage.getItem("pinkCycle_userAvatarSelected");
        
        if (cachedAvatar) {
          selectedAvatarPathStr = cachedAvatar;
        } else {
          const generatedIndexToken = Math.floor(Math.random() * 6) + 1;
          selectedAvatarPathStr = `../user_ui_png/pp-icon${generatedIndexToken}.png`;
          localStorage.setItem("pinkCycle_userAvatarSelected", selectedAvatarPathStr);
        }
        imgActiveAvatarNode.src = selectedAvatarPathStr;
      }

      /**
       * Account ID Core Engine Handler: Implements fallback placeholder strings if null
       */
      function synchronizeUserIdentificationRegistry() {
        // Fetch identity records map parameter
        user_id = localStorage.getItem("pinkCycle_userID");

        // Rule Validation: if user_id == null (for now) user_id = xxxxxxxxxxxxxxx
        if (user_id === null) {
          user_id = "xxxxxxxxxxxxxxx";
          // Leave it in memory workspace sandbox structure or let creation parameters overwrite it later
        }

        lblUserIdValue.textContent = user_id;
      }

      /**
       * Chronological Engine: Decodes lastResetTimestamp to trace remaining ad-free timeline days
       */
      function recalculateAdWaiverExpirationLifespan() {
        const isAdFreeBlocked = localStorage.getItem("pinkCycle_blockAds") === "true";
        const cachedTimestampStr = localStorage.getItem("pinkCycle_lastResetTimestamp");

        if (!isAdFreeBlocked || !cachedTimestampStr) {
          lblAdResetCountdownText.innerHTML = `Standard App Mode: Standard interface banner elements active. Visit <strong>Watch Ads</strong> to clear.`;
          return;
        }

        const parsedTimestamp = new Date(cachedTimestampStr);
        const currentTimestamp = new Date();
        const absoluteTimeDifferenceMs = currentTimestamp.getTime() - parsedTimestamp.getTime();
        const computedElapsedDays = Math.floor(absoluteTimeDifferenceMs / (1000 * 3600 * 24));
        const finalRemainingDays = 30 - computedElapsedDays;

        if (finalRemainingDays <= 0) {
          lblAdResetCountdownText.innerHTML = `Your monthly ad block waiver has expired. Rewatch ads inside the hub to restore ad-blocking privileges.`;
        } else {
          lblAdResetCountdownText.innerHTML = `<strong>${finalRemainingDays} Days remaining</strong> until your next ad reset cycle. Interface ads are blocked!`;
        }
      }

      /**
       * Registry Interface Synchronizer: Pulls state blocks from client local database maps
       */
      function synchronizeDatabasePropertiesToInterface() {
        runAvatarSystemSelectorFallback();
        synchronizeUserIdentificationRegistry();
        recalculateAdWaiverExpirationLifespan();

        // Map basic presentation strings out with clear visual fallback layers
        const storedName = localStorage.getItem("pinkCycle_userName") || "App User";
        const storedDob = localStorage.getItem("pinkCycle_userDOB") || "Not Set";
        const storedCycleLen = localStorage.getItem("pinkCycle_avgCycleLen") || "28";
        const storedPeriodLen = localStorage.getItem("pinkCycle_periodLen") || "5";
        const storedLastDate = localStorage.getItem("pinkCycle_lastPeriodDate") || "Not Set";

        // Push values to Read-Only presentation blocks
        lblProfileNameTitle.textContent = storedName;
        valViewName.textContent = storedName;
        valViewDob.textContent = storedDob !== "Not Set" ? formatStringDateToHumanReadable(storedDob) : storedDob;
        valViewCycleLen.textContent = `${storedCycleLen} Days`;
        valViewPeriodLen.textContent = `${storedPeriodLen} Days`;
        valViewLastDate.textContent = storedLastDate !== "Not Set" ? formatStringDateToHumanReadable(storedLastDate) : storedLastDate;

        // Push matching records into target input element components
        inputEditName.value = storedName === "App User" ? "" : storedName;
        inputEditDob.value = storedDob !== "Not Set" ? storedDob : "";
        inputEditCycleLen.value = storedCycleLen;
        inputEditPeriodLen.value = storedPeriodLen;
        inputEditLastDate.value = storedLastDate !== "Not Set" ? storedLastDate : "";
      }

      /**
       * Dynamic Carousel Creator: Draws avatar list options inside the editing dashboard view
       */
      function buildHorizontalAvatarPickerGutter() {
        containerAvatarOptionsTrack.innerHTML = "";
        
        for (let idx = 1; idx <= 6; idx++) {
          const matchingPath = `../user_ui_png/pp-icon${idx}.png`;
          
          const optButtonElement = document.createElement("div");
          optButtonElement.className = "selectable-avatar-option";
          if (matchingPath === selectedAvatarPathStr) {
            optButtonElement.classList.add("selected-active");
          }
          
          optButtonElement.innerHTML = `<img src="${matchingPath}" alt="Option Icon Frame ${idx}">`;
          
          optButtonElement.addEventListener("click", () => {
            document.querySelectorAll(".selectable-avatar-option").forEach(node => {
              node.classList.remove("selected-active");
            });
            
            optButtonElement.classList.add("selected-active");
            selectedAvatarPathStr = matchingPath;
            imgActiveAvatarNode.src = matchingPath; 
          });

          containerAvatarOptionsTrack.appendChild(optButtonElement);
        }
      }

      /**
       * Mutator Actions Routine: Updates display settings to match screen context swaps
       */
      function handleInterfaceStateTransition(targetModeState) {
        isEditModeActive = targetModeState;

        if (isEditModeActive) {
          bodyNode.classList.add("edit-mode-active");
          lblHeaderTitle.textContent = "Edit Profile";
          lblMasterActionText.textContent = "Save Changes";
          
          holderActionIconSvg.innerHTML = `
            <svg style="width:18px; height:18px;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
          `;
          buildHorizontalAvatarPickerGutter();
        } else {
          bodyNode.classList.remove("edit-mode-active");
          lblHeaderTitle.textContent = "My Profile";
          lblMasterActionText.textContent = "Edit Profile";
          
          holderActionIconSvg.innerHTML = `
            <svg style="width:18px; height:18px;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L10.582 16.07a4.5 4.5 0 01-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 011.13-1.897l8.932-8.931zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0115.75 21H5.25A2.25 2.25 0 013 18.75V8.25A2.25 2.25 0 015.25 6H10" />
            </svg>
          `;
          synchronizeDatabasePropertiesToInterface();
        }
      }

      /**
       * Transaction Pipeline: Commits updated input values to local storage fields
       */
      function commitProfileChangesToRegistry() {
        const structuralNameClean = inputEditName.value.trim();
        
        if (!structuralNameClean) {
          alert("Profile error: Name identifier field parameters cannot be empty.");
          return;
        }

        localStorage.setItem("pinkCycle_userName", structuralNameClean);
        localStorage.setItem("pinkCycle_userDOB", inputEditDob.value || "Not Set");
        localStorage.setItem("pinkCycle_avgCycleLen", inputEditCycleLen.value || "28");
        localStorage.setItem("pinkCycle_periodLen", inputEditPeriodLen.value || "5");
        localStorage.setItem("pinkCycle_lastPeriodDate", inputEditLastDate.value || "Not Set");
        localStorage.setItem("pinkCycle_userAvatarSelected", selectedAvatarPathStr);

        handleInterfaceStateTransition(false);
      }

      /**
       * Helper Utility: Converts standard calendar values into clean text date stamps
       */
      function formatStringDateToHumanReadable(isoDateString) {
        if (!isoDateString || isoDateString === "Not Set") return "--";
        try {
          const parseConfig = { year: 'numeric', month: 'short', day: 'numeric' };
          return new Date(isoDateString).toLocaleDateString(undefined, parseConfig);
        } catch (err) {
          return isoDateString;
        }
      }

      // 3. Hook Functional Event Listeners
      btnMasterProfileAction.addEventListener("click", () => {
        if (!isEditModeActive) {
          handleInterfaceStateTransition(true);
        } else {
          commitProfileChangesToRegistry();
        }
      });

      btnAbortEditMode.addEventListener("click", () => {
        const confirmDiscard = confirm("Discard all unsaved profile changes?");
        if (confirmDiscard) {
          handleInterfaceStateTransition(false);
        }
      });

      // Interactive Clipboard Node Click Event
      btnCopyUserId.addEventListener("click", () => {
        navigator.clipboard.writeText(user_id).then(() => {
          // Provide instant success checkmark feedback animation
          const originalCopyIconSvg = btnCopyUserId.innerHTML;
          btnCopyUserId.innerHTML = `
            <svg style="width:14px; height:14px;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="3" stroke="#22C55E">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
          `;
          
          setTimeout(() => {
            btnCopyUserId.innerHTML = originalCopyIconSvg;
          }, 1800);
        }).catch(err => {
          console.error("Clipboard routing failed: ", err);
        });
      });

      btnTriggerAdditionalLogs.addEventListener("click", () => {
        alert("The structural questionnaire extension hub is undergoing construction updates.");
      });

      // 4. Run Core Database Sync Boot Logic
      synchronizeDatabasePropertiesToInterface();
    });
  </script>
</body>
